<!DOCTYPE html>
<html>
<head>
    <title>Create Bank Account</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h2>Create Your Bank Account</h2>

<input type="text" id="fullName" placeholder="Full Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="text" id="phoneNumber" placeholder="Phone Number"><br>
<input type="text" id="idNumber" placeholder="SA ID Number"><br>
<input type="password" id="pin" placeholder="Create PIN"><br>

<button onclick="register()">Create Account</button>

<p id="message"></p>

<p>Already have an account?</p>
<a href="login.html">Login</a>

<script src="/js/app.js"></script>

</body>
</html>
